project_id = "pikesville-stats-app"

[auth]
site_url = "https://app.pikesvillembb.com"
additional_redirect_urls = [
  "https://app.pikesvillembb.com",
  "https://app.pikesvillembb.com/auth/update-password",
  "https://pikesville-stats-app.vercel.app",
  "https://pikesville-stats-app.vercel.app/auth/update-password",
  "http://localhost:3000",
  "http://localhost:3000/auth/update-password",
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/auth/update-password"
]

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m"
otp_length = 8
otp_expiry = 3600
