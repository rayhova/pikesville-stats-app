workflows:
  ios-capacitor-release:
    name: Pikesville MBB iOS Release
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: pikesville-mbb-app-store-connect
    environment:
      groups:
        - ios_signing
      node: 20.19.0
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: com.pikesville.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Validate Next.js app
        script: npm run build
      - name: Sync Capacitor iOS project
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Initialize iOS signing keychain
        script: keychain initialize
      - name: Fetch or create App Store signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @env:CERTIFICATE_PRIVATE_KEY \
            --create
      - name: Add signing certificates to keychain
        script: keychain add-certificates
      - name: Set up iOS code signing
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - raymond.gothaii@gmail.com
        notify:
          success: true
          failure: true
